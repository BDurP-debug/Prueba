<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏒 Ice Hockey Blast!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --ice: #d6f0ff;
    --ice-dark: #a8d8f0;
    --blue-team: #1a6fc4;
    --red-team: #e02828;
    --puck: #1a1a2e;
    --goal-gold: #ffd700;
    --bg: #0a1628;
    --rink-line: #5ab4e0;
    --text-light: #ffffff;
    --neon-cyan: #00f5ff;
    --neon-yellow: #ffee00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(26,111,196,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(224,40,40,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 14px 0 6px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.4);
    letter-spacing: 2px;
  }

  header p {
    color: #a0c8ff;
    font-size: 0.9rem;
    margin-top: 2px;
  }

  /* ─── SCOREBOARD ─── */
  #scoreboard {
    position: relative; z-index: 10;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 30px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    margin: 8px 0;
    backdrop-filter: blur(8px);
  }

  .team-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 90px;
  }

  .team-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
  }

  .score-num {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    line-height: 1;
  }

  #blue-score-label { color: #5ab4f5; }
  #blue-score { color: #5ab4f5; text-shadow: 0 0 12px #5ab4f5; }
  #red-score-label  { color: #ff6060; }
  #red-score  { color: #ff6060; text-shadow: 0 0 12px #ff6060; }

  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #timer {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
    min-width: 60px;
    text-align: center;
  }

  .vs-text {
    font-family: 'Fredoka One', cursive;
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 2px;
  }

  /* ─── CANVAS WRAPPER ─── */
  #canvas-wrap {
    position: relative; z-index: 10;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 3px rgba(90,180,224,0.4),
      0 0 40px rgba(0,245,255,0.15),
      0 20px 60px rgba(0,0,0,0.6);
  }

  canvas { display: block; }

  /* ─── CONTROLS ─── */
  #controls {
    position: relative; z-index: 10;
    display: flex;
    gap: 16px;
    margin: 10px 0 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .ctrl-label {
    font-size: 0.7rem;
    color: #6a8aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .ctrl-keys {
    display: grid;
    gap: 3px;
  }

  .key {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #cce0ff;
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 7px;
    text-align: center;
    min-width: 28px;
  }

  /* ─── OVERLAY ─── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,10,25,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  #overlay h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--neon-cyan);
    text-shadow: 0 0 30px var(--neon-cyan);
    margin-bottom: 10px;
    animation: pulse 1.5s infinite;
  }

  #overlay .sub {
    color: #a0c8ff;
    font-size: 1.1rem;
    margin-bottom: 30px;
    text-align: center;
    padding: 0 20px;
  }

  #start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    padding: 14px 50px;
    background: linear-gradient(135deg, #1a6fc4, #00a8ff);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,168,255,0.5);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: 1px;
  }

  #start-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 50px rgba(0,245,255,0.7);
  }

  #winner-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    margin-bottom: 8px;
  }

  .win-blue { color: #5ab4f5; text-shadow: 0 0 20px #5ab4f5; }
  .win-red  { color: #ff6060; text-shadow: 0 0 20px #ff6060; }
  .win-tie  { color: var(--neon-yellow); text-shadow: 0 0 20px var(--neon-yellow); }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  /* ─── GOAL FLASH ─── */
  #goal-flash {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 90;
    pointer-events: none;
  }

  #goal-flash.show {
    display: flex;
    animation: flashAnim .8s forwards;
  }

  #goal-flash span {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(4rem, 15vw, 9rem);
    color: var(--goal-gold);
    text-shadow: 0 0 40px var(--goal-gold), 0 0 80px rgba(255,215,0,0.5);
    animation: goalPop .8s forwards;
  }

  @keyframes flashAnim {
    0%   { background: rgba(255,215,0,0.3); }
    100% { background: transparent; }
  }

  @keyframes goalPop {
    0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    40%  { transform: scale(1.2) rotate(4deg); opacity: 1; }
    70%  { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1.05) rotate(0deg); opacity: 0; }
  }

  /* Mobile touch buttons */
  #touch-controls {
    display: none;
    position: relative; z-index: 10;
    gap: 30px;
    margin-top: 6px;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 3px;
  }

  .dpad-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
    touch-action: manipulation;
  }

  .dpad-btn:active { background: rgba(255,255,255,0.3); }
  .dpad-center { visibility: hidden; }

  @media (max-width: 700px) {
    #touch-controls { display: flex; }
    #controls { display: none; }
  }
</style>
</head>
<body>

<!-- GOAL FLASH -->
<div id="goal-flash"><span>⚡ GOL! ⚡</span></div>

<!-- OVERLAY (start / end) -->
<div id="overlay">
  <h2>🏒 Ice Hockey!</h2>
  <div id="winner-text"></div>
  <p class="sub" id="overlay-sub">
    Jugador 1 (Azul): <b>W A S D</b><br>
    Jugador 2 (Rojo): <b>↑ ↓ ← →</b><br>
    ¡Mete el puck en el arco rival!
  </p>
  <button id="start-btn" onclick="startGame()">¡JUGAR! 🎮</button>
</div>

<header>
  <h1>🏒 Ice Hockey Blast!</h1>
  <p>¡El juego de hockey más divertido!</p>
</header>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <div class="team-score">
    <span class="team-name" id="blue-score-label">🔵 AZUL</span>
    <span class="score-num" id="blue-score">0</span>
  </div>
  <div class="divider">
    <span id="timer">60</span>
    <span class="vs-text">VS</span>
  </div>
  <div class="team-score">
    <span class="team-name" id="red-score-label">🔴 ROJO</span>
    <span class="score-num" id="red-score">0</span>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="rink"></canvas>
</div>

<!-- KEYBOARD HINTS -->
<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">🔵 Jugador 1</span>
    <div class="ctrl-keys" style="grid-template-columns:repeat(3,1fr)">
      <span></span><span class="key">W</span><span></span>
      <span class="key">A</span><span class="key">S</span><span class="key">D</span>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">🔴 Jugador 2</span>
    <div class="ctrl-keys" style="grid-template-columns:repeat(3,1fr)">
      <span></span><span class="key">↑</span><span></span>
      <span class="key">←</span><span class="key">↓</span><span class="key">→</span>
    </div>
  </div>
</div>

<!-- TOUCH D-PADS (mobile) -->
<div id="touch-controls">
  <div>
    <div style="text-align:center;color:#5ab4f5;font-weight:900;font-size:.8rem;margin-bottom:4px">🔵 AZUL</div>
    <div class="dpad" id="dpad1">
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="1" data-dir="up">▲</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="1" data-dir="left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="1" data-dir="right">▶</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="1" data-dir="down">▼</div>
      <div class="dpad-center"></div>
    </div>
  </div>
  <div>
    <div style="text-align:center;color:#ff6060;font-weight:900;font-size:.8rem;margin-bottom:4px">🔴 ROJO</div>
    <div class="dpad" id="dpad2">
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="2" data-dir="up">▲</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="2" data-dir="left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="2" data-dir="right">▶</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" data-p="2" data-dir="down">▼</div>
      <div class="dpad-center"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('rink');
const ctx    = canvas.getContext('2d');

const BASE_W = 700, BASE_H = 420;
let scale = 1;

function resize() {
  const maxW = Math.min(window.innerWidth  - 16, 700);
  const maxH = Math.min(window.innerHeight - 260, 420);
  scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1);
  canvas.width  = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.scale(scale, scale);
}
resize();
window.addEventListener('resize', () => { resize(); });

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
const GAME_TIME   = 60;  // seconds
const PLAYER_SPD  = 3.6;
const PUCK_FRICTION= 0.985;
const PUCK_BOUNCE = 0.72;
const HIT_POWER   = 9;
const PLAYER_R    = 18;
const PUCK_R      = 10;
const GOAL_W      = 14;
const GOAL_H      = 90;
const RINK_PAD    = 22;

let scores    = [0, 0];
let timeLeft  = GAME_TIME;
let running   = false;
let timerInt  = null;
let particles = [];
let stars     = [];

// Build background stars once
for (let i = 0; i < 40; i++) {
  stars.push({
    x: Math.random() * BASE_W,
    y: Math.random() * BASE_H,
    r: Math.random() * 1.5 + 0.5,
    a: Math.random()
  });
}

// Player objects
const players = [
  {
    x: 160, y: BASE_H/2,
    vx: 0, vy: 0,
    color: '#1a6fc4',
    glow: '#5ab4f5',
    up: false, down: false, left: false, right: false,
    emoji: '🔵',
    trail: []
  },
  {
    x: BASE_W-160, y: BASE_H/2,
    vx: 0, vy: 0,
    color: '#e02828',
    glow: '#ff7070',
    up: false, down: false, left: false, right: false,
    emoji: '🔴',
    trail: []
  }
];

// Puck
let puck = { x: BASE_W/2, y: BASE_H/2, vx: 2.5, vy: 1.5, spin: 0 };

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function updateInput() {
  players[0].up    = !!(keys['w'] || keys['W']);
  players[0].down  = !!(keys['s'] || keys['S']);
  players[0].left  = !!(keys['a'] || keys['A']);
  players[0].right = !!(keys['d'] || keys['D']);

  players[1].up    = !!(keys['ArrowUp']);
  players[1].down  = !!(keys['ArrowDown']);
  players[1].left  = !!(keys['ArrowLeft']);
  players[1].right = !!(keys['ArrowRight']);
}

// Touch D-pads
const touchState = {1:{up:false,down:false,left:false,right:false},
                    2:{up:false,down:false,left:false,right:false}};

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const p   = btn.dataset.p;
  const dir = btn.dataset.dir;
  btn.addEventListener('touchstart', e => { e.preventDefault(); touchState[p][dir] = true; }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); touchState[p][dir] = false; }, {passive:false});
  btn.addEventListener('touchcancel',e => { touchState[p][dir] = false; });
});

function applyTouchInput() {
  ['up','down','left','right'].forEach(d => {
    if (touchState[1][d]) players[0][d] = true;
    if (touchState[2][d]) players[1][d] = true;
  });
}

// ═══════════════════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════════════════
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ═══════════════════════════════════════════════════════
//  GOAL FLASH
// ═══════════════════════════════════════════════════════
function showGoalFlash() {
  const el = document.getElementById('goal-flash');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
function spawnParticles(x, y, color, count = 18) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 5 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.04 + 0.025,
      r: Math.random() * 5 + 2,
      color
    });
  }
}

// ═══════════════════════════════════════════════════════
//  RESET POSITIONS
// ═══════════════════════════════════════════════════════
function resetPositions() {
  players[0].x = 160; players[0].y = BASE_H/2;
  players[1].x = BASE_W-160; players[1].y = BASE_H/2;
  players[0].vx = players[0].vy = 0;
  players[1].vx = players[1].vy = 0;
  players[0].trail = []; players[1].trail = [];
  const ang = (Math.random() * Math.PI/2) - Math.PI/4;
  const dir = Math.random() < 0.5 ? 1 : -1;
  puck.x = BASE_W/2; puck.y = BASE_H/2;
  puck.vx = Math.cos(ang) * 3.5 * dir;
  puck.vy = Math.sin(ang) * 3.5;
  puck.spin = 0;
}

// ═══════════════════════════════════════════════════════
//  GAME LOGIC UPDATE
// ═══════════════════════════════════════════════════════
const RINK_L = RINK_PAD + GOAL_W;
const RINK_R = BASE_W - RINK_PAD - GOAL_W;
const RINK_T = RINK_PAD;
const RINK_B = BASE_H - RINK_PAD;
const GOAL_TOP    = BASE_H/2 - GOAL_H/2;
const GOAL_BOTTOM = BASE_H/2 + GOAL_H/2;

function update() {
  if (!running) return;

  updateInput();
  applyTouchInput();

  // ── Move players ──
  players.forEach(p => {
    let ax = 0, ay = 0;
    if (p.up)    ay -= 1;
    if (p.down)  ay += 1;
    if (p.left)  ax -= 1;
    if (p.right) ax += 1;
    const mag = Math.hypot(ax, ay);
    if (mag > 0) { ax /= mag; ay /= mag; }
    p.vx = ax * PLAYER_SPD;
    p.vy = ay * PLAYER_SPD;

    p.x += p.vx; p.y += p.vy;

    // Wall clamp (rink bounds)
    p.x = Math.max(RINK_L + PLAYER_R, Math.min(RINK_R - PLAYER_R, p.x));
    p.y = Math.max(RINK_T + PLAYER_R, Math.min(RINK_B - PLAYER_R, p.y));

    // Trail
    p.trail.push({x: p.x, y: p.y});
    if (p.trail.length > 8) p.trail.shift();
  });

  // ── Player collision ──
  const d = dist(players[0], players[1]);
  if (d < PLAYER_R * 2) {
    const angle = Math.atan2(players[1].y - players[0].y, players[1].x - players[0].x);
    const overlap = PLAYER_R * 2 - d;
    players[0].x -= Math.cos(angle) * overlap/2;
    players[0].y -= Math.sin(angle) * overlap/2;
    players[1].x += Math.cos(angle) * overlap/2;
    players[1].y += Math.sin(angle) * overlap/2;
    spawnParticles(
      (players[0].x+players[1].x)/2,
      (players[0].y+players[1].y)/2,
      '#ffffff', 6
    );
  }

  // ── Puck physics ──
  puck.x += puck.vx;
  puck.y += puck.vy;
  puck.vx *= PUCK_FRICTION;
  puck.vy *= PUCK_FRICTION;
  puck.spin *= 0.95;

  // Rink top/bottom walls
  if (puck.y - PUCK_R < RINK_T) {
    puck.y = RINK_T + PUCK_R;
    puck.vy = Math.abs(puck.vy) * PUCK_BOUNCE;
    puck.spin = puck.vx * 0.3;
  }
  if (puck.y + PUCK_R > RINK_B) {
    puck.y = RINK_B - PUCK_R;
    puck.vy = -Math.abs(puck.vy) * PUCK_BOUNCE;
    puck.spin = puck.vx * 0.3;
  }

  // Left wall / goal
  if (puck.x - PUCK_R < RINK_L) {
    if (puck.y > GOAL_TOP && puck.y < GOAL_BOTTOM) {
      // GOAL for player 2 (red)
      scores[1]++;
      document.getElementById('red-score').textContent = scores[1];
      spawnParticles(puck.x, puck.y, '#ff6060', 30);
      showGoalFlash();
      resetPositions();
      return;
    } else {
      puck.x = RINK_L + PUCK_R;
      puck.vx = Math.abs(puck.vx) * PUCK_BOUNCE;
    }
  }
  // Right wall / goal
  if (puck.x + PUCK_R > RINK_R) {
    if (puck.y > GOAL_TOP && puck.y < GOAL_BOTTOM) {
      // GOAL for player 1 (blue)
      scores[0]++;
      document.getElementById('blue-score').textContent = scores[0];
      spawnParticles(puck.x, puck.y, '#5ab4f5', 30);
      showGoalFlash();
      resetPositions();
      return;
    } else {
      puck.x = RINK_R - PUCK_R;
      puck.vx = -Math.abs(puck.vx) * PUCK_BOUNCE;
    }
  }

  // ── Puck vs player collision ──
  players.forEach(p => {
    const dp = dist(p, puck);
    if (dp < PLAYER_R + PUCK_R) {
      const angle = Math.atan2(puck.y - p.y, puck.x - p.x);
      const speed  = Math.hypot(puck.vx, puck.vy);
      const newSpd = Math.max(speed, HIT_POWER * 0.6) + HIT_POWER * 0.4;
      puck.vx = Math.cos(angle) * newSpd;
      puck.vy = Math.sin(angle) * newSpd;
      puck.x  = p.x + Math.cos(angle) * (PLAYER_R + PUCK_R + 1);
      puck.y  = p.y + Math.sin(angle) * (PLAYER_R + PUCK_R + 1);
      puck.spin = puck.vx * 0.5;
      spawnParticles(puck.x, puck.y, '#ffffff', 8);
    }
  });

  // ── Particles ──
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    return p.life > 0;
  });
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function drawRoundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  // ── Ice rink ──
  const iceGrad = ctx.createLinearGradient(0, 0, 0, BASE_H);
  iceGrad.addColorStop(0, '#d8eeff');
  iceGrad.addColorStop(1, '#b8d8f0');
  drawRoundRect(RINK_PAD, RINK_PAD, BASE_W - RINK_PAD*2, BASE_H - RINK_PAD*2, 30);
  ctx.fillStyle = iceGrad;
  ctx.fill();

  // Rink border glow
  ctx.strokeStyle = '#5ab4e0';
  ctx.lineWidth = 3;
  ctx.stroke();

  // ── Ice texture lines ──
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#4499cc';
  ctx.lineWidth = 1;
  for (let y = RINK_T + 20; y < RINK_B; y += 18) {
    ctx.beginPath();
    ctx.moveTo(RINK_L, y);
    ctx.lineTo(RINK_R, y);
    ctx.stroke();
  }
  ctx.restore();

  // ── Center circle ──
  ctx.save();
  ctx.strokeStyle = '#c00';
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.arc(BASE_W/2, BASE_H/2, 60, 0, Math.PI*2);
  ctx.stroke();
  // Center dot
  ctx.fillStyle = '#c00';
  ctx.beginPath();
  ctx.arc(BASE_W/2, BASE_H/2, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Center line ──
  ctx.save();
  ctx.strokeStyle = '#c00';
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(BASE_W/2, RINK_T);
  ctx.lineTo(BASE_W/2, RINK_B);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── Blue lines ──
  [BASE_W*0.3, BASE_W*0.7].forEach(lx => {
    ctx.save();
    ctx.strokeStyle = '#1a6fc4';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(lx, RINK_T);
    ctx.lineTo(lx, RINK_B);
    ctx.stroke();
    ctx.restore();
  });

  // ── Goals ──
  // Left goal (red scores here → blue goal)
  ctx.fillStyle = 'rgba(26,111,196,0.5)';
  ctx.fillRect(RINK_PAD, GOAL_TOP, GOAL_W + 2, GOAL_H);
  ctx.strokeStyle = '#1a6fc4';
  ctx.lineWidth = 3;
  ctx.strokeRect(RINK_PAD, GOAL_TOP, GOAL_W + 2, GOAL_H);

  // Right goal (blue scores here → red goal)
  ctx.fillStyle = 'rgba(224,40,40,0.5)';
  ctx.fillRect(RINK_R - 2, GOAL_TOP, GOAL_W + 2, GOAL_H);
  ctx.strokeStyle = '#e02828';
  ctx.lineWidth = 3;
  ctx.strokeRect(RINK_R - 2, GOAL_TOP, GOAL_W + 2, GOAL_H);

  // Crease circles
  [
    { x: RINK_L, color: 'rgba(26,111,196,0.15)' },
    { x: RINK_R, color: 'rgba(224,40,40,0.15)' }
  ].forEach(c => {
    ctx.save();
    ctx.beginPath();
    ctx.arc(c.x, BASE_H/2, 45, 0, Math.PI*2);
    ctx.fillStyle = c.color;
    ctx.fill();
    ctx.restore();
  });

  // ── Player trails ──
  players.forEach(p => {
    p.trail.forEach((pt, i) => {
      ctx.save();
      ctx.globalAlpha = (i / p.trail.length) * 0.18;
      ctx.fillStyle = p.glow;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, PLAYER_R * 0.7, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  });

  // ── Players ──
  players.forEach((p, i) => {
    // Glow
    ctx.save();
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, PLAYER_R * 2);
    g.addColorStop(0, p.glow + '55');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R * 2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Body
    ctx.save();
    ctx.shadowColor = p.glow;
    ctx.shadowBlur  = 14;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(p.x - 5, p.y - 5, PLAYER_R * 0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Jersey number
    ctx.fillStyle = '#fff';
    ctx.font      = 'bold 13px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, p.x, p.y);

    // Stick
    const stickAng = (p.vx || p.vy) ? Math.atan2(p.vy, p.vx) : (i === 0 ? 0 : Math.PI);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(stickAng);
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth   = 4;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(PLAYER_R - 2, 0);
    ctx.lineTo(PLAYER_R + 22, 0);
    // Blade
    ctx.moveTo(PLAYER_R + 18, 0);
    ctx.lineTo(PLAYER_R + 22, 8);
    ctx.stroke();
    ctx.restore();
  });

  // ── Puck ──
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur  = 10;
  // Spin indicator (rotation line)
  ctx.translate(puck.x, puck.y);
  ctx.rotate(puck.spin * Date.now() / 100);
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(0, 0, PUCK_R, PUCK_R * 0.65, 0, 0, Math.PI*2);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-2, -2, PUCK_R * 0.5, PUCK_R * 0.3, -0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Particles ──
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // ── Speed lines for fast puck ──
  const puckSpd = Math.hypot(puck.vx, puck.vy);
  if (puckSpd > 6) {
    ctx.save();
    ctx.globalAlpha = Math.min((puckSpd - 6) / 6, 0.5);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 1.5;
    const ang = Math.atan2(puck.vy, puck.vx);
    for (let i = 0; i < 3; i++) {
      const off = (i - 1) * 5;
      const len = puckSpd * 3;
      ctx.beginPath();
      ctx.moveTo(
        puck.x - Math.cos(ang) * 12 + Math.sin(ang) * off,
        puck.y - Math.sin(ang) * 12 - Math.cos(ang) * off
      );
      ctx.lineTo(
        puck.x - Math.cos(ang) * (12 + len) + Math.sin(ang) * off,
        puck.y - Math.sin(ang) * (12 + len) - Math.cos(ang) * off
      );
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;
  if (dt < 100) { // skip huge gaps
    update();
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function startTimer() {
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    if (!running) return;
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
}

// ═══════════════════════════════════════════════════════
//  START / END
// ═══════════════════════════════════════════════════════
function startGame() {
  scores    = [0, 0];
  timeLeft  = GAME_TIME;
  particles = [];
  document.getElementById('blue-score').textContent = '0';
  document.getElementById('red-score').textContent  = '0';
  document.getElementById('timer').textContent       = GAME_TIME;
  document.getElementById('overlay').style.display  = 'none';
  resetPositions();
  running = true;
  startTimer();
}

function endGame() {
  running = false;
  clearInterval(timerInt);

  const overlay    = document.getElementById('overlay');
  const winnerEl   = document.getElementById('winner-text');
  const subEl      = document.getElementById('overlay-sub');
  const btnEl      = document.getElementById('start-btn');
  const titleEl    = overlay.querySelector('h2');

  titleEl.textContent = '⏱️ ¡TIEMPO!';

  if (scores[0] > scores[1]) {
    winnerEl.className   = 'winner-text win-blue';
    winnerEl.textContent = '🔵 ¡AZUL GANA! 🏆';
  } else if (scores[1] > scores[0]) {
    winnerEl.className   = 'winner-text win-red';
    winnerEl.textContent = '🔴 ¡ROJO GANA! 🏆';
  } else {
    winnerEl.className   = 'winner-text win-tie';
    winnerEl.textContent = '🤝 ¡EMPATE!';
  }

  subEl.innerHTML = `Marcador final: <b style="color:#5ab4f5">${scores[0]}</b> – <b style="color:#ff6060">${scores[1]}</b>`;
  btnEl.textContent = '¡JUGAR DE NUEVO! 🔄';
  overlay.style.display = 'flex';
}
</script>
